name: Test Setup

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check secrets are configured
        env:
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          ACCOUNT_SID: ${{ secrets.ACCOUNT_SID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          TWILIO_NUMBER: ${{ secrets.TWILIO_NUMBER }}
          MY_NUMBER: ${{ secrets.MY_NUMBER }}
        run: |
          [ -n "$OWM_API_KEY" ] && echo "OWM_API_KEY OK" || exit 1
          [ -n "$ACCOUNT_SID" ] && echo "ACCOUNT_SID OK" || exit 1
          [ -n "$AUTH_TOKEN" ] && echo "AUTH_TOKEN OK" || exit 1
          [ -n "$TWILIO_NUMBER" ] && echo "TWILIO_NUMBER OK" || exit 1
          [ -n "$MY_NUMBER" ] && echo "MY_NUMBER OK" || exit 1

      - name: Check required files
        run: |
          test -f main.py && echo "main.py found"
          test -f requirements.txt && echo "requirements.txt found"

      - name: Test Python syntax
        run: python -m py_compile main.py

      - name: Success
        run: echo "All checks passed!"
